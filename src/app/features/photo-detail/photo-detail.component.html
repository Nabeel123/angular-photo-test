<main class="photo-detail" aria-label="Photo detail">

  @if (isLoading()) {
    <div class="photo-detail__loading" role="status" aria-live="polite" aria-label="Loading">
      <mat-spinner [diameter]="52"></mat-spinner>
    </div>
  }

  @if (error()) {
    <div class="photo-detail__error" role="alert">
      <mat-icon class="photo-detail__error-icon">broken_image</mat-icon>
      <h2 class="photo-detail__error-title">Photo not found</h2>
      <p class="photo-detail__error-body">{{ error() }}</p>
      <button mat-flat-button class="photo-detail__back-btn" type="button" (click)="goBack()">
        <mat-icon>arrow_back</mat-icon>
        Back to Photos
      </button>
    </div>
  }

  @if (photo(); as currentPhoto) {
    <div class="photo-detail__layout">
      <figure class="photo-detail__figure">
        <figcaption class="photo-detail__figcaption">Photo by {{ currentPhoto.author }}</figcaption>
        <div
          class="photo-detail__skeleton"
          [class.photo-detail__skeleton--hidden]="imageLoaded()"
          aria-hidden="true"
        ></div>
        <img
          appImageLoad
          [resetTrigger]="currentPhoto.id"
          (loaded)="onImageLoad()"
          [ngSrc]="currentPhoto.imageUrl"
          [width]="currentPhoto.imageWidth"
          [height]="currentPhoto.imageHeight"
          [alt]="'Full photo by ' + currentPhoto.author"
          class="photo-detail__image"
          [class.photo-detail__image--loaded]="imageLoaded()"
          priority
        />
      </figure>

      <div class="photo-detail__actions">
        <button
          mat-flat-button
          class="photo-detail__back-btn"
          type="button"
          (click)="goBack()"
          [attr.aria-label]="isFavorite() ? 'Back to Favorites' : 'Back to Photos'"
        >
          <mat-icon>arrow_back</mat-icon>
          {{ isFavorite() ? 'Back to Favorites' : 'Back to Photos' }}
        </button>

        <button
          mat-flat-button
          class="photo-detail__fav-btn"
          [class.photo-detail__fav-btn--active]="isFavorite()"
          type="button"
          (click)="toggleFavorite()"
          [attr.aria-label]="isFavorite() ? 'Remove from favorites' : 'Add to favorites'"
        >
          <mat-icon>{{ isFavorite() ? 'favorite' : 'favorite_border' }}</mat-icon>
          {{ isFavorite() ? 'Remove from Favorites' : 'Add to Favorites' }}
        </button>
      </div>
    </div>
  }

</main>
